services:
  db:
    image: pgvector/pgvector:pg16
    container_name: hipaa_rag_db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-hipaa_rag}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hipaa_rag_backend
    restart: unless-stopped
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    container_name: hipaa_rag_frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://nginx/api}

  nginx:
    image: nginx:1.27-alpine
    container_name: hipaa_rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  ngrok:
    image: ngrok/ngrok:latest
    container_name: hipaa_rag_ngrok
    restart: unless-stopped
    command: http --url=${NGROK_URL} nginx:80
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - nginx

volumes:
  db_data:
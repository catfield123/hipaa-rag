services:
  db:
    build:
      context: ./db
    container_name: hipaa_rag_db
    restart: unless-stopped
    command: ["postgres", "-c", "shared_preload_libraries=pg_textsearch"]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-hipaa_rag}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hipaa_rag_backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/hipaa_rag}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
    depends_on:
      - db
    command: >
      sh -c "python -m app.wait_for_db &&
             alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

  ingest:
    build:
      context: ./backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/hipaa_rag}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_CHAT_MODEL=${OPENAI_CHAT_MODEL:-gpt-4.1-mini}
      - OPENAI_EMBEDDING_MODEL=${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1536}
      - HIPAA_PDF_PATH=/data/hipaa-combined.pdf
    volumes:
      - ${HIPAA_PDF_SOURCE:-/home/catfield123/Downloads/hipaa-combined.pdf}:/data/hipaa-combined.pdf:ro
    depends_on:
      - db
    command: >
      sh -c "python -m app.wait_for_db &&
             alembic upgrade head &&
             python -m app.ingest.run"

  frontend:
    build:
      context: ./frontend
    container_name: hipaa_rag_frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://nginx/api}

  nginx:
    image: nginx:1.27-alpine
    container_name: hipaa_rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  ngrok:
    image: ngrok/ngrok:latest
    container_name: hipaa_rag_ngrok
    restart: unless-stopped
    command: http --url=${NGROK_URL} nginx:80
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - nginx

volumes:
  db_data:
services:
  db:
    build:
      context: ./db
    container_name: hipaa_rag_db
    restart: unless-stopped
    command: ["postgres", "-c", "shared_preload_libraries=pg_textsearch"]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-hipaa_rag}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: hipaa_rag_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    command: >
      sh -c "python -m app.wait_for_db &&
             alembic upgrade head &&
             uvicorn main:app --host 0.0.0.0 --port 8000"

  ingest:
    build:
      context: ./backend
    env_file:
      - .env
    volumes:
      - ${FILTERED_MARKDOWN_SOURCE:-./filtered_markdown.md}:/data/filtered_markdown.md:ro
    depends_on:
      - db
    command: >
      sh -c "python -m app.wait_for_db &&
             alembic upgrade head &&
             python -m app.ingest.run"

  frontend:
    build:
      context: ./frontend
    container_name: hipaa_rag_frontend
    restart: unless-stopped
    environment:
      - BACKEND_URL=${BACKEND_URL:-http://nginx/api}

  nginx:
    image: nginx:1.27-alpine
    container_name: hipaa_rag_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend

  ngrok:
    image: ngrok/ngrok:latest
    container_name: hipaa_rag_ngrok
    restart: unless-stopped
    command: http --url=${NGROK_URL} nginx:80
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    depends_on:
      - nginx

volumes:
  db_data: